<header class="header" id="header">
  <div class="header__inner">
    <a href="./" class="header__logo" aria-label="EXPERT">
      <span class="header__logo-placeholder"></span>
    </a>

    <button
      type="button"
      class="header__menu-btn"
      id="menuBtn"
      aria-label="메뉴 열기"
      aria-expanded="false"
      aria-controls="mobileMenu"
    >
      <span class="header__menu-icon"></span>
    </button>

    <nav class="header__nav" id="gnb" aria-label="주요 메뉴">
      <ul class="header__menu">
        {{> nav-menu}}
      </ul>
    </nav>
  </div>
</header>
