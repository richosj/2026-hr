{{#> layout-hero}}
<section class="hero" id="hero">
  <div class="padding-global">
    <div class="hero-container">
      <div class="hero-component" id="heroComponent">
        <div class="home-2-hero align-middle-mobile">
          <h1 class="home-hero-heading blending">Creative Agency</h1>
        </div>

        <div class="cube-wrapper">
          <div class="cube" id="heroCube">
            <div class="cube-front images">
              <img src="" alt="" loading="eager" decoding="async" />
            </div>
            <div class="cube-right no-padding">
              <img src="" alt="" loading="eager" decoding="async" />
            </div>
            <div class="cube-left no-padding">
              <img src="" alt="" loading="eager" decoding="async" />
            </div>
            <div class="cube-bottom images">
              <img src="" alt="" class="flip-vertical" loading="eager" decoding="async" />
            </div>
            <div class="cube-top images">
              <img src="" alt="" class="flip-vertical" loading="eager" decoding="async" />
            </div>
            <div class="cube-back images"></div>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>
{{/layout-hero}}
