{{#> layout}}
<section class="location location-page sub-page" id="location">
  <div class="location__inner location-page__inner sub-page__inner">
    <header class="location__head location-page__head sub-page-hero">
      <h1 class="location__title location-page__title sub-page-hero__title">Location</h1>
      <p class="location__desc location-page__desc sub-page-hero__desc">편리한 이동을 위해 주요 교통 정보를 안내드립니다.</p>
    </header>

    <div class="location__content">
      <div class="location__info">
        <div class="location__transport">
          <section class="location-route">
            <h2 class="location-route__title">
              <img src="./src/assets/images/location/icon-subway.svg" alt="" aria-hidden="true" />
              <span>지하철</span>
            </h2>
            <ul class="location-route__list">
              <li>
                <i class="location-route__icon">
                  <img src="./src/assets/images/location/line-1.png" alt="1호선" />
                  
                </i>
                <span>시청역 9번 출구 도보 5분</span>
              </li>
              <li>
                <img src="./src/assets/images/location/line-2.png" alt="2호선" />
                <span>회현역 5번 출구 도보 10분</span>
              </li>
              <li>
                <img src="./src/assets/images/location/line-4.png" alt="4호선" />
                <span>회현역 5번 출구 도보 10분</span>
              </li>
            </ul>
          </section>

          <section class="location-route">
            <h2 class="location-route__title">
              <img src="./src/assets/images/location/icon-bus.svg" alt="" aria-hidden="true" />
              <span>버스</span>
            </h2>
            <p class="location-route__text">신한은행본점, 숭례문, 엽천교, 서울역</p>
          </section>
        </div>

        <div class="location__address">
          <p>대한상공회의소 국제회의장 (서울 중구 세종대로 39 B2F)</p>
          <p>주차가 어려우니 가급적 대중교통 이용 부탁드립니다.</p>
        </div>
      </div>

      {{!-- 지도 삽입 영역 --}}
      <div class="location__map" id="locationMap" aria-label="대한상공회의소 위치 지도">
        <div id="daumRoughmapContainer1784105451483" class="root_daum_roughmap root_daum_roughmap_landing"></div>
      </div>
    </div>
  </div>
</section>
<!-- * 카카오맵 - 지도퍼가기 -->
<!-- 1. 지도 노드 -->


<!--
	2. 설치 스크립트
	* 지도 퍼가기 서비스를 2개 이상 넣을 경우, 설치 스크립트는 하나만 삽입합니다.
-->
<script charset="UTF-8" class="daum_roughmap_loader_script" src="https://ssl.daumcdn.net/dmaps/map_js_init/roughmapLoader.js"></script>

<!-- 3. 실행 스크립트 -->
<script charset="UTF-8">
	new daum.roughmap.Lander({
		"timestamp" : "1784105451483",
		"key" : "r9xh5rtknqd",
		"mapWidth" : "640",
		"mapHeight" : "340"
	}).render();
</script>

{{/layout}}
