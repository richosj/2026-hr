{{#> layout}}
<section class="location" id="location">
  <div class="location__inner">
    <header class="location__head">
      <h1 class="location__title">Location</h1>
      <p class="location__desc">편리한 이동을 위해 주요 교통 정보를 안내드립니다.</p>
    </header>

    <div class="location__content">
      <div class="location__info">
        <div class="location__transport">
          <section class="location-route">
            <h2 class="location-route__title">
              <img src="./src/assets/images/location/icon-subway.svg" alt="" aria-hidden="true" />
              <span>지하철</span>
            </h2>
            <ul class="location-route__list">
              <li>
                <img src="./src/assets/images/location/line-1.svg" alt="1호선" />
                <span>시청역 9번 출구 도보 5분</span>
              </li>
              <li>
                <img src="./src/assets/images/location/line-2.svg" alt="2호선" />
                <span>회현역 5번 출구 도보 10분</span>
              </li>
              <li>
                <img src="./src/assets/images/location/line-4.svg" alt="4호선" />
                <span>회현역 5번 출구 도보 10분</span>
              </li>
            </ul>
          </section>

          <section class="location-route">
            <h2 class="location-route__title">
              <img src="./src/assets/images/location/icon-bus.svg" alt="" aria-hidden="true" />
              <span>버스</span>
            </h2>
            <p class="location-route__text">신한은행본점, 숭례문, 엽천교, 서울역</p>
          </section>
        </div>

        <div class="location__address">
          <p>대한상공회의소 국제회의장 (서울 중구 세종대로 39 B2F)</p>
          <p>주차가 어려우니 가급적 대중교통 이용 부탁드립니다.</p>
        </div>
      </div>

      {{!-- 지도 삽입 영역 --}}
      <div class="location__map" id="locationMap" aria-label="대한상공회의소 위치 지도">
        <span>지도 영역</span>
      </div>
    </div>
  </div>
</section>
{{/layout}}
